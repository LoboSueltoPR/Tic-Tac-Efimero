<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1c1208"/>
  <!-- Cara del reloj -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="#3a2010" stroke-width="12"/>
  <circle cx="256" cy="256" r="172" fill="#0e0a06"/>
  <!-- Marcas de hora -->
  <line x1="256" y1="96" x2="256" y2="120" stroke="#5c4030" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="392" x2="256" y2="416" stroke="#5c4030" stroke-width="10" stroke-linecap="round"/>
  <line x1="96" y1="256" x2="120" y2="256" stroke="#5c4030" stroke-width="10" stroke-linecap="round"/>
  <line x1="392" y1="256" x2="416" y2="256" stroke="#5c4030" stroke-width="10" stroke-linecap="round"/>
  <!-- Manecilla larga (12 → posición ~10) -->
  <line x1="256" y1="256" x2="196" y2="148" stroke="#f0dfc0" stroke-width="18" stroke-linecap="round"/>
  <!-- Manecilla corta (hora ~2) -->
  <line x1="256" y1="256" x2="330" y2="298" stroke="#c95218" stroke-width="14" stroke-linecap="round"/>
  <!-- Centro -->
  <circle cx="256" cy="256" r="18" fill="#d4900b"/>
  <circle cx="256" cy="256" r="8" fill="#0e0a06"/>
  <!-- Chispa IA (estrella pequeña arriba derecha) -->
